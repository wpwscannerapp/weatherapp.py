<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1e3a8a, #0f3460);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .dash {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 30px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .clock { font-size: 28px; text-align: right; color: #a5b4fc; }
        .emoji { font-size: 100px; animation: float 4s infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .temp { font-size: 78px; font-weight: 200; }
        .section { margin-top: 35px; }
        .daily { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px; }
        .day { text-align: center; }
    </style>
</head>
<body>
    <div class="dash" id="dash">
        <div class="clock" id="clock"></div>
        Loading weather data...
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', hour12: true});
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function updateWeather() {
            try {
                const d = await (await fetch('/api/weather')).json();
                let html = `
                    <div class="clock" id="clock"></div>
                    <div style="font-size:26px;color:#a5b4fc">${d.location}</div>
                    <div class="emoji">${d.emoji}</div>
                    <div class="temp">${d.temperature}°F</div>
                    <div style="font-size:24px">${d.condition} • Feels ${d.feels_like}°F</div>
                `;

                // Daily Forecast
                if (d.daily && d.daily.length > 0) {
                    html += `<div class="section"><h3>7-Day Forecast</h3><div class="daily">`;
                    d.daily.forEach(day => {
                        html += `<div class="day"><b>${day.day}</b><br>${day.max}° / ${day.min}°</div>`;
                    });
                    html += `</div></div>`;
                }

                html += `<div style="margin-top:25px;font-size:14px;color:#888">Updated ${new Date(d.last_update).toLocaleTimeString()}</div>`;
                document.getElementById('dash').innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        }

        updateWeather();
        setInterval(updateWeather, 30000);
    </script>
</body>
</html>
