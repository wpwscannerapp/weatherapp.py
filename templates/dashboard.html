<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1e3a8a, #0f3460);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .dashboard {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 580px;
            text-align: center;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .location {
            font-size: 26px;
            color: #a5b4fc;
            margin-bottom: 15px;
        }
        .emoji {
            font-size: 120px;
            margin: 20px 0;
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        .temperature {
            font-size: 92px;
            font-weight: 200;
            line-height: 1;
        }
        .condition {
            font-size: 28px;
            margin: 10px 0 25px;
            color: #cbd5e0;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .metric-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }
        .metric-value {
            font-size: 36px;
            font-weight: 300;
        }
        .update {
            margin-top: 40px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="dashboard" id="dashboard">
        <p>Loading weather data...</p>
    </div>

    <script>
        async function updateWeather() {
            try {
                const response = await fetch('/api/weather');
                const data = await response.json();

                document.getElementById('dashboard').innerHTML = `
                    <div class="location">${data.location || "Unknown Location"}</div>
                    <div class="emoji">${data.emoji}</div>
                    <div class="temperature">${Math.round(data.temperature)}°C</div>
                    <div class="condition">${data.condition}</div>
                    <div>Feels like ${Math.round(data.feels_like)}°C</div>
                    
                    <div class="metrics">
                        <div>
                            <div class="metric-label">Humidity</div>
                            <div class="metric-value">${data.humidity}%</div>
                        </div>
                        <div>
                            <div class="metric-label">Wind Speed</div>
                            <div class="metric-value">${data.wind_speed} km/h</div>
                        </div>
                    </div>
                    <div class="update">Updated ${new Date(data.last_update).toLocaleTimeString()}</div>
                `;
            } catch (e) {
                document.getElementById('dashboard').innerHTML = `<p>⚠️ Connecting to weather service...</p>`;
            }
        }

        // Initial load + update every 30 seconds
        updateWeather();
        setInterval(updateWeather, 30000);
    </script>
</body>
</html>
