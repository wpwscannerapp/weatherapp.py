<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station • Bristow, VA</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #05080f;
            color: #e0f0ff;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }
        .station {
            background: linear-gradient(180deg, #0c1428, #1a2338);
            border: 2px solid #334466;
            border-radius: 12px;
            padding: 25px;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #334466;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .clock { font-size: 32px; font-weight: bold; color: #00ccff; }
        .location { font-size: 28px; color: #66ccff; }
        .main-info {
            text-align: center;
            margin: 20px 0;
        }
        .emoji { font-size: 120px; }
        .temperature { font-size: 92px; font-weight: 200; margin: 0; }
        .condition { font-size: 26px; margin: 10px 0; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px;
            margin: 30px 0;
        }
        .metric {
            background: rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334466;
        }
        .label { font-size: 13px; color: #8899bb; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 28px; font-weight: 300; }
        .daily {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 25px;
        }
        .day {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            min-width: 70px;
        }
    </style>
</head>
<body>
    <div class="station" id="station">
        <div style="text-align:center; padding:80px;">Loading Weather Station...</div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
                hour: 'numeric', minute: '2-digit', hour12: true
            });
        }
        setInterval(updateClock, 1000);

        async function updateWeather() {
            try {
                const res = await fetch('/api/weather');
                const d = await res.json();

                if (d.status === "loading") return;

                let html = `
                    <div class="header">
                        <div>
                            <div class="location">${d.location}</div>
                            <div class="condition">${d.condition}</div>
                        </div>
                        <div class="clock" id="clock"></div>
                    </div>

                    <div class="main-info">
                        <div class="emoji">${d.emoji}</div>
                        <div class="temperature">${d.temperature}°F</div>
                        <div style="font-size:22px">Feels like ${d.feels_like}°F</div>
                    </div>

                    <div class="grid">
                        <div class="metric"><div class="label">Humidity</div><div class="value">${d.humidity}%</div></div>
                        <div class="metric"><div class="label">Wind</div><div class="value">${d.wind_speed} mph</div></div>
                        <div class="metric"><div class="label">Pressure</div><div class="value">${d.pressure} hPa</div></div>
                    </div>
                `;

                if (d.daily) {
                    html += `<h3 style="text-align:center; margin:25px 0 15px; color:#66ccff;">7-DAY FORECAST</h3><div class="daily">`;
                    d.daily.forEach(day => {
                        html += `<div class="day"><b>${day.day}</b><br><span style="font-size:20px">${day.max}°</span> / ${day.min}°</div>`;
                    });
                    html += `</div>`;
                }

                html += `<div style="text-align:center; margin-top:30px; color:#556677; font-size:14px;">Last Updated: ${d.last_update || 'Just now'}</div>`;
                document.getElementById('station').innerHTML = html;
            } catch(e) {}
        }

        updateWeather();
        setInterval(updateWeather, 30000);
    </script>
</body>
</html>
