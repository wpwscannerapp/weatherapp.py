<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1e3a8a, #0f3460);
            color: #ffffff;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }
        .container {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .clock {
            font-size: 28px;
            font-weight: bold;
            color: #a5b4fc;
        }
        .location {
            font-size: 24px;
            color: #a5b4fc;
        }
        .main {
            text-align: center;
            margin: 20px 0;
        }
        .emoji {
            font-size: 110px;
            margin: 10px 0;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .temp {
            font-size: 78px;
            font-weight: 200;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .label {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .value {
            font-size: 26px;
            font-weight: 300;
        }
        .daily {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        .day {
            text-align: center;
            min-width: 60px;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <p style="text-align:center; padding:60px 20px;">Loading weather data...</p>
    </div>

    <script>
        function updateClock() {
            const clock = document.getElementById('clock');
            if (clock) clock.textContent = new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', hour12: true});
        }
        setInterval(updateClock, 1000);

        async function updateDashboard() {
            try {
                const res = await fetch('/api/weather');
                const data = await res.json();

                if (data.status === "loading") {
                    return;
                }

                let html = `
                    <div class="header">
                        <div>
                            <div class="location">${data.location}</div>
                            <div style="font-size:20px;">${data.condition}</div>
                        </div>
                        <div class="clock" id="clock"></div>
                    </div>
                    
                    <div class="main">
                        <div class="emoji">${data.emoji}</div>
                        <div class="temp">${data.temperature}°F</div>
                        <div style="font-size:22px; margin-top:8px;">Feels like ${data.feels_like}°F</div>
                    </div>

                    <div class="grid">
                        <div class="card">
                            <div class="label">Humidity</div>
                            <div class="value">${data.humidity}%</div>
                        </div>
                        <div class="card">
                            <div class="label">Wind Speed</div>
                            <div class="value">${data.wind_speed} mph</div>
                        </div>
                        <div class="card">
                            <div class="label">Pressure</div>
                            <div class="value">${data.pressure} hPa</div>
                        </div>
                    </div>
                `;

                // 7-Day Forecast
                if (data.daily && data.daily.length > 0) {
                    html += `<h3 style="margin:25px 0 15px; text-align:center;">7-DAY FORECAST</h3><div class="daily">`;
                    data.daily.forEach(day => {
                        html += `<div class="day"><strong>${day.day}</strong><br>${day.max}° / ${day.min}°</div>`;
                    });
                    html += `</div>`;
                }

                html += `<div style="text-align:center; margin-top:30px; font-size:14px; color:#888;">
                    Last Updated: ${data.last_update || 'Just now'}
                </div>`;

                document.getElementById('container').innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        // Initial load and refresh every 30 seconds
        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
