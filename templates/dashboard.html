<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00ff9d;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }
        .dash {
            background: rgba(10, 15, 35, 0.95);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 25px;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.3);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .clock { font-size: 32px; font-weight: bold; }
        .location { font-size: 22px; color: #00ccff; }
        .emoji { font-size: 110px; }
        .temp { font-size: 82px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin: 30px 0; }
        .card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; border: 1px solid #334455; }
        .label { font-size: 12px; color: #8899aa; }
        .value { font-size: 28px; }
    </style>
</head>
<body>
    <div class="dash" id="dash">
        <p>Loading technical weather station...</p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {hour12: true});
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function updateWeather() {
            try {
                const d = await (await fetch('/api/weather')).json();
                
                let html = `
                    <div class="header">
                        <div>
                            <div class="location">${d.location}</div>
                            <div style="font-size:18px;color:#00ccff">${d.condition}</div>
                        </div>
                        <div class="clock" id="clock"></div>
                    </div>
                    <div class="emoji">${d.emoji}</div>
                    <div class="temp">${d.temperature}°F</div>
                    <div style="font-size:22px">Feels like ${d.feels_like}°F</div>
                `;

                html += `<div class="grid">`;
                html += `<div class="card"><div class="label">HUMIDITY</div><div class="value">${d.humidity}%</div></div>`;
                html += `<div class="card"><div class="label">WIND</div><div class="value">${d.wind_speed} mph</div></div>`;
                html += `<div class="card"><div class="label">PRESSURE</div><div class="value">${d.pressure} hPa</div></div>`;
                html += `<div class="card"><div class="label">DEW POINT</div><div class="value">${d.dew_point}°F</div></div>`;
                html += `</div>`;

                // 7-Day Forecast
                if (d.daily) {
                    html += `<h3 style="margin:20px 0 15px">7-DAY FORECAST</h3><div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px">`;
                    d.daily.forEach(day => {
                        html += `<div style="text-align:center"><b>${day.day}</b><br>${day.max}° / ${day.min}°</div>`;
                    });
                    html += `</div>`;
                }

                html += `<div style="margin-top:25px;font-size:14px;color:#556677">Last Updated: ${new Date(d.last_update).toLocaleTimeString()}</div>`;
                document.getElementById('dash').innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        }

        updateWeather();
        setInterval(updateWeather, 30000);
    </script>
</body>
</html>
